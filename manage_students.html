<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #f5f7fa;
            font-family: 'Poppins', sans-serif;
        }
        .card-custom {
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            padding: 20px;
            margin-top: 40px;
        }
        .table th {
            background: #212529;
            color: white;
        }
        .btn-custom {
            border-radius: 8px;
        }
    </style>
</head>
<body class="container">

    <div class="card card-custom">
        <h2 class="text-center mb-4">👨‍🎓 Manage Students</h2>

        <!-- Add / Update Form -->
        <form method="POST" class="mb-4">
            <div class="row g-3">
                <div class="col-md-2">
                    <input type="text" name="id" placeholder="ID" required class="form-control">
                </div>
                <div class="col-md-3">
                    <input type="text" name="name" placeholder="Name" required class="form-control">
                </div>
                <div class="col-md-3">
                    <input type="text" name="dept" placeholder="Department" required class="form-control">
                </div>
                <div class="col-md-2">
                    <input type="number" name="year" placeholder="Year" required class="form-control">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success btn-custom w-100">
                        <i class="fas fa-plus"></i> Add / Update
                    </button>
                </div>
            </div>
        </form>

        <!-- Student Table -->
        <!-- Student Table -->
{% if students %}
<div class="table-responsive">
    <table class="table table-bordered table-striped align-middle">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Year</th>
                <th>Action</th> <!-- Add Action Column -->
            </tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr>
                <td>{{s.id}}</td>
                <td>{{s.name}}</td>
                <td>{{s.department}}</td>
                <td>{{s.year}}</td>
                <td>
                    <a href="/delete_student/{{ s.id }}" class="btn btn-danger btn-sm">❌ Delete</a>

                                           </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="alert alert-warning text-center">⚠️ No students found in database.</div>
{% endif %}

        <!-- Footer Actions -->
        <div class="text-center mt-4">
            <a href="/" class="btn btn-dark btn-custom">
                <i class="fas fa-home"></i> Back to Dashboard
            </a>
            <a href="/logout" class="btn btn-danger btn-custom ms-2">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </div>

</body>
</html>
