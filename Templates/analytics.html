<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
<div class="container my-5">

    <h2 class="text-center mb-4">📊 Attendance Analytics</h2>

    <!-- Filter Form -->
    <form method="POST" class="row g-3 mb-4">

        <!-- Student -->
        <div class="col-md-3">
            <label class="form-label">Student</label>
            <select name="student" class="form-select">
                <option value="all">All</option>
                {% for s in students %}
                    <option value="{{ s['id'] }}" {% if selected_student == s['id']|string %}selected{% endif %}>
                        {{ s['name'] }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Department -->
        <div class="col-md-3">
            <label class="form-label">Department</label>
            <select name="department" class="form-select">
                <option value="all">All</option>
                {% for d in departments %}
                    <option value="{{ d }}" {% if selected_department == d %}selected{% endif %}>{{ d }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Date Range -->
        <div class="col-md-2">
            <label class="form-label">Start Date</label>
            <input type="date" name="start_date" value="{{ start_date }}" class="form-control">
        </div>
        <div class="col-md-2">
            <label class="form-label">End Date</label>
            <input type="date" name="end_date" value="{{ end_date }}" class="form-control">
        </div>

        <!-- Apply -->
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">Apply</button>
        </div>
    </form>

    <!-- Chart -->
    <div class="card shadow-sm p-4">
        <canvas id="attendanceChart"></canvas>
    </div>

</div>

<script>
    const ctx = document.getElementById('attendanceChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: {{ chart_labels|tojson }},
            datasets: [{
                label: 'Attendance Count',
                data: {{ chart_counts|tojson }},
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1,
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                title: {
                    display: true,
                    text: 'Attendance Record',
                    font: { size: 18 }
                }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>

</body>
</html>
